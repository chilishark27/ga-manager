name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            electron_cmd: build:win
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            electron_cmd: build:mac
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            electron_cmd: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend to backend/static
        shell: bash
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static

      - name: Build Backend
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o ../build/${{ matrix.goos }}-${{ matrix.goarch }}/ga-manager${{ matrix.ext }} .

      - name: Build Electron
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npx electron-builder --${{ matrix.goos == 'windows' && 'win' || matrix.goos == 'darwin' && 'mac' || 'linux' }} --publish never

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/electron/*.exe
            build/electron/*.dmg
            build/electron/*.zip
            build/electron/*.blockmap
            build/electron/*.AppImage
            build/electron/*.yml
          draft: false
