<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; width: 150px; height: 150px; user-select: none; }
#pet-container { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; }
#pet-container.dragging { cursor: grabbing; }
#pet-img { width: 140px; height: 140px; object-fit: contain; image-rendering: pixelated; cursor: grab; -webkit-user-drag: none; }
#pet-bubble { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #e0c0d0; border-radius: 12px; padding: 6px 12px; font-size: 13px; font-family: -apple-system, sans-serif; color: #333; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; z-index: 10; }
#pet-bubble::after { content:''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid #fff; }
#pet-name { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #666; font-family: -apple-system, sans-serif; opacity: 0; transition: opacity 0.2s; }
#pet-container:hover #pet-name { opacity: 1; }
#selector { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.97); border-radius: 12px; padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y: auto; z-index: 100; align-content: start; }
#selector.show { display: grid; }
.sel-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.sel-item:hover { background: #fef0f4; border-color: #f0c0d0; }
.sel-item.active { border-color: #d4729a; background: #fef0f4; }
.sel-item img { width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; }
.sel-item span { font-size: 10px; color: #444; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50px; font-weight: 500; }
#toggle-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(200,160,175,0.3); border: none; color: #999; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
#pet-container:hover #toggle-btn { opacity: 1; }
#toggle-btn:hover { background: rgba(220,80,80,0.2); color: #c00; }
@keyframes bounce { 0%{transform:scale(1)} 20%{transform:scale(0.85) rotate(-5deg)} 50%{transform:scale(1.15) rotate(3deg)} 70%{transform:scale(0.95)} 100%{transform:scale(1)} }
.bounce { animation: bounce 0.4s ease; }
</style>
</head>
<body>
<div id="pet-container">
  <div id="pet-bubble"></div>
  <img id="pet-img" src="" alt="pet" draggable="false">
  <div id="pet-name"></div>
  <button id="toggle-btn" title="Hide pet">脳</button>
  <div id="selector"></div>
</div>
<script src="pet-renderer.js"></script>
</body>
</html>
